<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>WORM.BAS — Zenith Z-100</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; min-height: 100dvh; }
canvas { display: block; aspect-ratio: 4/3; max-height: 90vh; max-width: 100%; }
@media (max-width: 768px) {
  canvas { max-height: 70vh; }
}
@media (min-width: 769px) {
  #controls { display: none !important; }
  #kbinput { display: none; }
}
#monitor {
  background: #000;
  padding: 2vw;
  border-radius: 18px;
  box-shadow: 0 0 60px rgba(51,255,51,0.15), inset 0 0 80px rgba(0,0,0,0.8);
  border: 3px solid #222;
  max-width: 95vw;
}
#controls {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 16px;
  margin-top: 12px;
  padding: 0 8px;
  width: 95vw;
  max-width: 640px;
  user-select: none;
  -webkit-user-select: none;
}
#arrows, #numkeys, #ynkeys, #anykey, #kbrow {
  display: flex;
  gap: 6px;
}
#controls button {
  flex: 1;
  height: 56px;
  font-size: 22px;
  font-weight: bold;
  font-family: monospace;
  background: linear-gradient(180deg, #b8b4a8 0%, #9e9a8e 100%);
  color: #333;
  border: 1px solid #7a776c;
  border-radius: 6px;
  box-shadow: 0 2px 0 #6b685e, inset 0 1px 0 rgba(255,255,255,0.3);
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#controls button:active {
  background: linear-gradient(180deg, #9e9a8e 0%, #8a867a 100%);
  box-shadow: 0 1px 0 #6b685e, inset 0 1px 2px rgba(0,0,0,0.2);
  transform: translateY(1px);
}
</style>
</head>
<body>
<div id="monitor">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <div id="arrows">
    <button data-key="ArrowLeft">&larr;</button>
    <button data-key="ArrowDown">&darr;</button>
    <button data-key="ArrowUp">&uarr;</button>
    <button data-key="ArrowRight">&rarr;</button>
  </div>
  <div id="numkeys" style="display:none">
    <button data-char="0">0</button>
    <button data-char="1">1</button>
    <button data-char="2">2</button>
    <button data-char="3">3</button>
    <button data-char="4">4</button>
    <button data-char="5">5</button>
  </div>
  <div id="ynkeys" style="display:none">
    <button data-char="Y">Y</button>
    <button data-char="N">N</button>
  </div>
  <div id="anykey" style="display:none">
    <button data-char=" ">ANY</button>
  </div>
  <div id="kbrow" style="display:none">
    <button id="kbbtn">KEYBOARD</button>
  </div>
</div>
<input id="kbinput" type="text" autocapitalize="characters" autocomplete="off" autocorrect="off" spellcheck="false"
  style="position:fixed;left:-9999px;top:0;opacity:0;width:1px;height:1px;">
<script type="module">
import { Screen, Interpreter, WORM_SOURCE } from './worm.js';

const canvas = document.getElementById('screen');
const screen = new Screen(canvas);
const interp = new Interpreter(screen, WORM_SOURCE);

// Resize canvas buffer when window changes size
window.addEventListener('resize', () => screen.resize());

// Wire up keyboard (skip when soft keyboard input is focused)
document.addEventListener('keydown', (e) => {
  if (document.activeElement === document.getElementById('kbinput')) return;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
  if (e.key === 'Backspace') e.preventDefault();
  const ch = Interpreter.keyEventToChar(e);
  if (ch) interp.injectKey(ch);
});

// Wire up touch buttons
document.getElementById('controls').addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  e.preventDefault();
  const key = btn.dataset.key;
  const char = btn.dataset.char;
  if (key) {
    const ch = Interpreter.keyEventToChar({ key });
    if (ch) interp.injectKey(ch);
  } else if (char) {
    interp.injectKey(char);
  }
});

// Show/hide control groups based on game state
const kbInput = document.getElementById('kbinput');
const arrows = document.getElementById('arrows');
const numkeys = document.getElementById('numkeys');
const ynkeys = document.getElementById('ynkeys');
const anykey = document.getElementById('anykey');
const kbrow = document.getElementById('kbrow');
let lastUIState = '';
function updateControls() {
  const state = interp.uiState;
  if (state === lastUIState) return;
  lastUIState = state;
  arrows.style.display = (state === 'game') ? 'flex' : 'none';
  numkeys.style.display = (state === 'menu') ? 'flex' : 'none';
  ynkeys.style.display = (state === 'yesno') ? 'flex' : 'none';
  anykey.style.display = (state === 'anykey') ? 'flex' : 'none';
  kbrow.style.display = (state === 'initials') ? 'flex' : 'none';
  if (state === 'initials') kbInput.focus();
  else kbInput.blur();
}
updateControls();
setInterval(updateControls, 100);

// Wire up soft keyboard for text input
document.getElementById('kbbtn').addEventListener('pointerdown', (e) => {
  e.preventDefault();
  kbInput.focus();
});
kbInput.addEventListener('input', () => {
  const val = kbInput.value;
  if (val.length > 0) {
    interp.injectKey(val[val.length - 1]);
    kbInput.value = '';
  }
});
kbInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    interp.injectKey(String.fromCharCode(13));
  } else if (e.key === 'Backspace') {
    e.preventDefault();
    interp.injectKey(String.fromCharCode(8));
  }
});

// Start immediately — the menu IS the splash screen
interp.run();
</script>
</body>
</html>
