<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WORM.BAS — Zenith Z-100</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; aspect-ratio: 4/3; max-height: 90vh; max-width: 100%; }
#monitor {
  background: #000;
  padding: 2vw;
  border-radius: 18px;
  box-shadow: 0 0 60px rgba(51,255,51,0.15), inset 0 0 80px rgba(0,0,0,0.8);
  border: 3px solid #222;
  max-width: 95vw;
  max-height: 95vh;
}
</style>
</head>
<body>
<div id="monitor">
  <canvas id="screen"></canvas>
</div>
<script type="module">
import { Screen, Interpreter, WORM_SOURCE } from './worm.js';

const canvas = document.getElementById('screen');
const screen = new Screen(canvas);
const interp = new Interpreter(screen, WORM_SOURCE);

// Wire up keyboard
document.addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
  if (e.key === 'Backspace') e.preventDefault();
  const ch = Interpreter.keyEventToChar(e);
  if (ch) interp.injectKey(ch);
});

// Start immediately — the menu IS the splash screen
interp.run();
</script>
</body>
</html>
