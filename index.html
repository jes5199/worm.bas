<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>WORM.BAS — Zenith Z-100</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; min-height: 100dvh; }
canvas { display: block; aspect-ratio: 4/3; max-height: 70vh; max-width: 100%; }
#monitor {
  background: #000;
  padding: 2vw;
  border-radius: 18px;
  box-shadow: 0 0 60px rgba(51,255,51,0.15), inset 0 0 80px rgba(0,0,0,0.8);
  border: 3px solid #222;
  max-width: 95vw;
}
#controls {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 16px;
  margin-top: 12px;
  padding: 0 8px;
  width: 95vw;
  max-width: 640px;
  user-select: none;
  -webkit-user-select: none;
}
#arrows, #numkeys {
  display: flex;
  gap: 6px;
}
#controls button {
  flex: 1;
  height: 56px;
  font-size: 22px;
  font-weight: bold;
  font-family: monospace;
  background: linear-gradient(180deg, #b8b4a8 0%, #9e9a8e 100%);
  color: #333;
  border: 1px solid #7a776c;
  border-radius: 6px;
  box-shadow: 0 2px 0 #6b685e, inset 0 1px 0 rgba(255,255,255,0.3);
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#controls button:active {
  background: linear-gradient(180deg, #9e9a8e 0%, #8a867a 100%);
  box-shadow: 0 1px 0 #6b685e, inset 0 1px 2px rgba(0,0,0,0.2);
  transform: translateY(1px);
}
</style>
</head>
<body>
<div id="monitor">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <div id="arrows">
    <button data-key="ArrowLeft">&larr;</button>
    <button data-key="ArrowDown">&darr;</button>
    <button data-key="ArrowUp">&uarr;</button>
    <button data-key="ArrowRight">&rarr;</button>
  </div>
  <div id="numkeys">
    <button data-char="0">0</button>
    <button data-char="1">1</button>
    <button data-char="2">2</button>
    <button data-char="3">3</button>
    <button data-char="4">4</button>
    <button data-char="5">5</button>
  </div>
</div>
<script type="module">
import { Screen, Interpreter, WORM_SOURCE } from './worm.js';

const canvas = document.getElementById('screen');
const screen = new Screen(canvas);
const interp = new Interpreter(screen, WORM_SOURCE);

// Resize canvas buffer when window changes size
window.addEventListener('resize', () => screen.resize());

// Wire up keyboard
document.addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
  if (e.key === 'Backspace') e.preventDefault();
  const ch = Interpreter.keyEventToChar(e);
  if (ch) interp.injectKey(ch);
});

// Wire up touch buttons
document.getElementById('controls').addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  e.preventDefault();
  const key = btn.dataset.key;
  const char = btn.dataset.char;
  if (key) {
    const ch = Interpreter.keyEventToChar({ key });
    if (ch) interp.injectKey(ch);
  } else if (char) {
    interp.injectKey(char);
  }
});

// Start immediately — the menu IS the splash screen
interp.run();
</script>
</body>
</html>
